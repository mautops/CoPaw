services:
  # ── 后端: QwenPaw ──────────────────────────────────────────────────────────
  backend:
    image: agentscope/qwenpaw:latest
    ports:
      - "8088:8088"
    volumes:
      - /root/.qwenpaw:/root/.qwenpaw
      - /root/.qwenpaw.secret:/root/.qwenpaw.secret
      - /root/.qwenpaw.backup:/root/.qwenpaw.backup
      - /usr/local/sbin:/usr/local/sbin
      - /root/.config:/root/.config
      - /app/working/:/app/working/
    networks:
      - qwenpaw
    restart: unless-stopped

  # ── 前端: Next.js Console ──────────────────────────────────────────────────
  console:
    image: repo.gz.cvte.cn/docker-public/hi-ops:v0.0.15
    user: root
    ports:
      - "3000:3000"
    environment:
      - LOG_LEVEL=debug
      - HOSTNAME=0.0.0.0
      - COPAW_HOME=/root
      - BETTER_AUTH_URL=https://hiops.gz.cvte.cn
      - API_URL=http://backend:8088
      - NEXT_PUBLIC_API_URL=http://backend:8088
      - BETTER_AUTH_SECRET=hRWXicHV8zMzfSfxRDURfXHIoGLtw9zn
      - DATABASE_URL=postgresql://postgres:H2kd8viVFJ@db:5432/postgres
      - KEYCLOAK_CLIENT_ID=hi-ops
      - KEYCLOAK_CLIENT_SECRET=g94qR9K9AYKSPMhjh995Nr9VVNc1DUMy
      - KEYCLOAK_ISSUER=https://sso.cvte.com/auth/realms/default
      - COPAW_CORS_ORIGINS=https://hiops.gz.cvte.cn,http://10.10.14.94:8088
      - COPAW_WORKING_DIR=/app/working
    volumes:
      - /root/.qwenpaw:/root/.qwenpaw
      - /root/.qwenpaw.secret:/root/.qwenpaw.secret
      - /root/.qwenpaw.backup:/root/.qwenpaw.backup
      - /app/working/:/app/working/
    depends_on:
      - backend
      - db
    networks:
      - qwenpaw
    restart: unless-stopped

  # ── 数据库: PostgreSQL ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=H2kd8viVFJ
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - /root/pgdata:/var/lib/postgresql/data
    networks:
      - qwenpaw
    restart: unless-stopped

networks:
  qwenpaw:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.200.0/24
