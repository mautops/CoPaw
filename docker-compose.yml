version: "3.8"

volumes:
  copaw-data:
    name: copaw-data
  copaw-secrets:
    name: copaw-secrets

services:
  copaw:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: agentscope/copaw:latest
    container_name: copaw
    restart: always
    ports:
      - "127.0.0.1:8088:8088"
    # environment:
    #   - COPAW_AUTH_ENABLED=true
    #   - COPAW_AUTH_USERNAME=admin
    #   - COPAW_AUTH_PASSWORD=yourpassword
    volumes:
      - copaw-data:/app/working
      - copaw-secrets:/app/working.secret

  # UI: set BETTER_AUTH_SECRET, DATABASE_URL, Keycloak vars in a repo-root .env for compose.
  next-console:
    build:
      context: ./next-console
      dockerfile: Dockerfile
    image: agentscope/copaw-next-console:latest
    container_name: copaw-next-console
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      COPAW_API_URL: http://copaw:8088
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      COPAW_UPSTREAM_JWT_SECRET: ${COPAW_UPSTREAM_JWT_SECRET:-}
    depends_on:
      - copaw
